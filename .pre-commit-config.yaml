repos:
  # ── General ──────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  # ── Python (src/, tests/, examples/, docs/) ──────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^src/supervisors/|^tests/|^examples/|^docs/
      - id: ruff-format
        files: ^src/supervisors/|^tests/|^examples/|^docs/

  # ── Rust (src/) ──────────────────────────────────────────────────────────
  # Note: Rust hooks require cargo to be installed.
  # They are skipped in pre-commit.ci (ci.skip) but run locally.
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        files: ^src/.*\.rs$
        ci: [skip]
      - id: clippy
        args: [--, -D, warnings]
        files: ^src/.*\.rs$
        ci: [skip]
